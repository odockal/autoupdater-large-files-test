<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'">
  <title>AutoUpdater Large File Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .meta {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }
    .meta span { color: #a0a8ff; }
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    button {
      padding: 10px 22px;
      font-size: 0.95rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #check-btn  { background: #4a5eff; color: #fff; }
    #install-btn { background: #26a641; color: #fff; }
    #status {
      margin-top: 16px;
      padding: 14px 24px;
      border-radius: 8px;
      width: 480px;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;
      transition: background 0.3s;
    }
    .idle       { background: #1e1e30; }
    .checking   { background: #1e2840; }
    .downloading{ background: #1e2840; }
    .up-to-date { background: #1e3020; }
    .downloaded { background: #1e3a20; }
    .error      { background: #3a1e1e; color: #ff9090; }
  </style>
</head>
<body>
  <h1>AutoUpdater Large File Test</h1>

  <div class="meta">
    Version: <span id="version">…</span> &nbsp;|&nbsp;
    Feed: <span id="feed-url">…</span>
  </div>

  <div class="actions">
    <button id="check-btn"   onclick="checkForUpdates()">Check for Updates</button>
    <button id="install-btn" onclick="installUpdate()" disabled>Install &amp; Restart</button>
  </div>

  <div id="status" class="idle">Ready.</div>

  <script src="renderer.js"></script>
</body>
</html>
